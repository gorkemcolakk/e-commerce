<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giriş Yap | EVENTİX - Modern Etkinlik Platformu</title>
  
  <!-- CSS Styles -->
  <link rel="stylesheet" href="./styles/main.css">
  <link rel="stylesheet" href="./styles/components.css">
  <link rel="stylesheet" href="./styles/auth.css">
</head>
<body>

  <main class="auth-page">
    <div class="auth-card glass-panel animate-up">
      
      <div class="auth-header">
        <a href="index.html" class="auth-logo logo">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="url(#gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <defs>
              <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#8b5cf6" />
                <stop offset="100%" stop-color="#ec4899" />
              </linearGradient>
            </defs>
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
            <line x1="12" y1="22.08" x2="12" y2="12"></line>
          </svg>
          <span style="font-size: 1.5rem; text-decoration: none; color: white;">EVENT<span class="logo-highlight">İX</span></span>
        </a>
        <h1 class="auth-title">Hoş Geldin!</h1>
        <p class="auth-subtitle">Etkinlik anahtarlarına ulaşmak için giriş yap.</p>
      </div>

      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">E-posta Adresi</label>
          <input type="email" id="email" class="form-control" placeholder="ornek@mail.com" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Şifre</label>
          <div class="password-input-wrapper">
            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            <button type="button" class="password-toggle" onclick="togglePassword('password')">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
          <a href="#" class="forgot-password">Şifremi Unuttum</a>
        </div>

        <button type="submit" class="btn btn-primary auth-submit">Giriş Yap</button>
      </form>

      <div class="auth-divider">
        <span>Veya</span>
      </div>

      <div class="social-login-grid">
        <button class="btn-social">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.95c5.05-1.11 9-5.53 9-10.95z"></path></svg>
          Google
        </button>
        <button class="btn-social">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.49.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.379.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z"></path></svg>
          Github
        </button>
      </div>

      <div class="auth-footer">
        Hesabın yok mu? <a href="register.html" class="auth-link">Kayıt Ol</a>
      </div>

    </div>
  </main>

  <script>
    function togglePassword(inputId) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
      } else {
        input.type = 'password';
      }
    }
  </script>
  <script src="./scripts/auth.js"></script>
</body>
</html>
