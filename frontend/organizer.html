<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organizatör Paneli | EVENTİX</title>
  <link rel="stylesheet" href="./styles/main.css">
  <link rel="stylesheet" href="./styles/components.css">
  <link rel="stylesheet" href="./styles/dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="logo"><span>EVENT<span class="logo-highlight">İX</span></span></a>
      <div class="user-controls"></div>
    </div>
  </nav>

  <main class="container dashboard-page">
    <aside class="dash-sidebar glass-panel">
      <div class="dash-avatar" id="orgAvatar">O</div>
      <div class="dash-name" id="orgName">Organizatör</div>
      <div class="dash-role-badge">Organizatör</div>
      <nav class="dash-nav">
        <button class="dash-nav-btn active" onclick="showTab('myevents',this)">Etkinliklerim</button>
        <button class="dash-nav-btn" onclick="showTab('create',this)">+ Etkinlik Oluştur</button>
        <button class="dash-nav-btn" onclick="showTab('revenue',this)">Gelir Raporu</button>
        <button class="dash-nav-btn" onclick="showTab('validate',this)">QR Doğrulama</button>
      </nav>
      <button onclick="logout()" class="btn btn-danger" style="width:100%;justify-content:center;margin-top:auto;">Çıkış Yap</button>
    </aside>

    <div class="dash-content">

      <!-- MY EVENTS -->
      <section id="tab-myevents" class="dash-tab">
        <h2 class="dash-section-title">Etkinliklerim</h2>
        <div id="myEventsList"><p class="loading-text">Yükleniyor...</p></div>
      </section>

      <!-- CREATE EVENT -->
      <section id="tab-create" class="dash-tab" style="display:none;">
        <h2 class="dash-section-title">Yeni Etkinlik Oluştur</h2>
        <div class="glass-panel" style="max-width:600px;padding:28px;">

          <div style="margin-bottom: 24px;">
            <label class="form-label" style="font-size:1.1rem; margin-bottom: 15px; color: white;">Bilet Tipi Seçimi</label>
            <div style="display: flex; gap: 15px;">
              <label style="flex:1; cursor:pointer;">
                <input type="radio" name="ticket_type" value="standard" checked onchange="toggleSeating()" style="display:none;">
                <div class="ticket-type-box glass-panel" style="padding:15px; text-align:center; border: 2px solid var(--accent-purple); border-radius:10px; transition: all 0.3s;" id="typeStandardBox">
                  <div style="font-weight:bold; color:white; margin-bottom:5px;">Genel Giriş</div>
                  <div style="font-size:0.8rem; color:var(--text-muted);">Tek tip bilet havuzu oluşturur. (Ayakta / Numarasız)</div>
                </div>
              </label>
              <label style="flex:1; cursor:pointer;">
                <input type="radio" name="ticket_type" value="seated" onchange="toggleSeating()" style="display:none;">
                <div class="ticket-type-box glass-panel" style="padding:15px; text-align:center; border: 2px solid transparent; border-radius:10px; transition: all 0.3s;" id="typeSeatedBox">
                  <div style="font-weight:bold; color:white; margin-bottom:5px;">Koltuk Seçimli Seçimli</div>
                  <div style="font-size:0.8rem; color:var(--text-muted);">Farklı blok ve fiyatlandırmalar ile numaralı koltuk planı.</div>
                </div>
              </label>
            </div>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;">
            <div>
              <label class="form-label">Etkinlik Adı *</label>
              <input type="text" id="evTitle" class="form-control" placeholder="Konser adı...">
            </div>
            <div>
              <label class="form-label">Kategori *</label>
              <select id="evCategory" class="form-control">
                <option value="concert">Konser</option>
                <option value="theater">Tiyatro</option>
                <option value="workshop">Atölye</option>
              </select>
            </div>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;">
            <div>
              <label class="form-label">Tarih ve Saat *</label>
              <input type="datetime-local" id="evDate" class="form-control">
            </div>
            <div id="standardPriceContainer">
              <label class="form-label">Fiyat (TL) *</label>
              <input type="number" id="evPrice" class="form-control" placeholder="500" min="0">
            </div>
          </div>

          <div style="margin-bottom:14px;">
            <label class="form-label">Konum *</label>
            <input type="text" id="evLocation" class="form-control" placeholder="Bir mekan seçin veya yazın..." list="locationList">
            <datalist id="locationList">
                <option value="Arena, Istanbul"></option>
                <option value="Açıkhava Tiyatrosu, İzmir"></option>
                <option value="Kongre Merkezi, Ankara"></option>
                <option value="Jolly Joker, Kartal"></option>
                <option value="Kadıköy Sahne, İstanbul"></option>
                <option value="Zorlu PSM, İstanbul"></option>
            </datalist>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;">
            <div id="standardCapContainer">
              <label class="form-label">Kapasite *</label>
              <input type="number" id="evCapacity" class="form-control" placeholder="1000" min="1">
            </div>
            <div>
              <label class="form-label">Görsel / Afiş Yükle</label>
              <input type="file" id="evImageFile" class="form-control" accept="image/*" style="padding:10px;">
            </div>
          </div>

          <div style="margin-bottom:14px;">
            <label class="form-label">Açıklama</label>
            <textarea id="evDesc" class="form-control" rows="4" placeholder="Etkinlik detayları..."></textarea>
          </div>

          <div style="margin-bottom:18px;display:flex;align-items:center;gap:10px;">
            <input type="checkbox" id="evFeatured" style="width:16px;height:16px;">
            <label for="evFeatured" class="form-label" style="margin:0;cursor:pointer;">Öne çıkan etkinlik olarak işaretle</label>
          </div>

          <div id="seatingPlanBuilder" class="glass-panel" style="display:none; padding:15px; margin-bottom:20px; border:1px solid rgba(45,212,191,0.3);">
            <div style="margin-bottom:15px;">
              <label class="form-label" style="color:var(--accent-teal);">Oturma Planı Görseli (İsteğe Bağlı)</label>
              <input type="file" id="evSeatingImageFile" class="form-control" accept="image/*" style="padding:10px;">
              <p style="font-size:0.75rem; color:var(--text-muted); margin-top:5px;">Müşterilerin bilet alırken konumu daha iyi anlaması için sahne dizilim şeması ekleyebilirsiniz.</p>
            </div>
            <h4 style="margin:0 0 10px; color:white; font-size: 0.95rem;">Oturma Planı Blokları</h4>
            <div id="zonesContainer"></div>
            <button type="button" class="btn btn-outline" style="width:100%;font-size:0.85rem;margin-top:10px;" onclick="addZone()">+ Alan/Blok Ekle (Örn: VIP, Balkon)</button>
          </div>

          <!-- FEEDBACK BURADA - BUTONUN HEMEN ÜSTÜNDE -->
          <div id="evFeedback" style="margin-bottom:12px;"></div>

          <button id="evSubmitBtn" class="btn btn-primary" style="width:100%;justify-content:center;padding:14px;font-size:1rem;">
            Etkinlik Oluştur
          </button>
        </div>
      </section>

      <!-- REVENUE -->
      <section id="tab-revenue" class="dash-tab" style="display:none;">
        <h2 class="dash-section-title">Gelir Raporu</h2>
        <div id="revenueSummary"><p class="loading-text">Yükleniyor...</p></div>
        
        <div class="glass-panel" style="margin-top: 24px; padding: 20px;">
          <canvas id="revenueChart" style="max-height: 300px;"></canvas>
        </div>

        <h3 style="color:var(--text);margin:28px 0 16px;">Etkinlik Bazlı Döküm</h3>
        <div id="revenueBreakdown"></div>
      </section>

      <!-- QR VALIDATE -->
      <section id="tab-validate" class="dash-tab" style="display:none;">
        <h2 class="dash-section-title">QR Bilet Dogrulama</h2>
        <div class="glass-panel" style="max-width:480px;padding:28px;">
          
          <!-- Bilet Scanner UI -->
          <div id="reader" style="width: 100%; min-height: 250px; background: rgba(0,0,0,0.2); border-radius: 12px; margin-bottom: 20px; overflow: hidden; border: 1px solid var(--border);"></div>
          
          <div style="margin-bottom:14px;">
            <label class="form-label">Manuel Kod Girişi</label>
            <input type="text" id="qrInput" class="form-control" placeholder="EVENTIX-...">
          </div>
          <div style="display:flex;gap:10px;">
            <button class="btn btn-outline" style="flex:1;justify-content:center;" onclick="checkQR()">Kontrol Et</button>
            <button class="btn btn-primary" style="flex:1;justify-content:center;" onclick="useQR()">Kullanildi Say</button>
          </div>
          <div id="qrValidResult" style="margin-top:16px;"></div>
        </div>
      </section>

    </div>
  </main>

  <script src="./scripts/auth.js"></script>
  <script>
    // ── Guard ──────────────────────────────────────────────────
    var currentUser = getUser();
    if (!currentUser || (currentUser.role !== 'organizer' && currentUser.role !== 'admin')) {
      alert('Bu sayfa sadece organizatorlere ozeldir.');
      window.location.href = 'index.html';
    }
    document.getElementById('orgName').textContent = currentUser.fullname;
    var initials = currentUser.fullname.split(' ').map(function(w){ return w[0]; }).join('').toUpperCase().slice(0,2);
    document.getElementById('orgAvatar').textContent = initials;

    // ── Tab Switch ─────────────────────────────────────────────
    function showTab(name, btn) {
      var tabs = document.querySelectorAll('.dash-tab');
      for (var i = 0; i < tabs.length; i++) tabs[i].style.display = 'none';
      document.getElementById('tab-' + name).style.display = 'block';
      var navBtns = document.querySelectorAll('.dash-nav-btn');
      for (var j = 0; j < navBtns.length; j++) navBtns[j].classList.remove('active');
      if (btn) btn.classList.add('active');
      if (name === 'myevents') loadMyEvents();
      if (name === 'revenue') loadRevenue();
      if (name === 'validate') initQRScanner();
    }

    // ── My Events ─────────────────────────────────────────────
    function loadMyEvents() {
      var el = document.getElementById('myEventsList');
      el.innerHTML = '<p class="loading-text">Yukleniyor...</p>';
      var token = getToken();
      fetch('/api/organizer/events', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      .then(function(r){ return r.json(); })
      .then(function(events) {
        if (!events.length) {
          el.innerHTML = '<p class="loading-text">Henuz etkinlik olusturmadiniz.</p>';
          return;
        }
        var html = '';
        for (var i = 0; i < events.length; i++) {
          var e = events[i];
          var statusTxt = e.status === 'active' ? 'Aktif' : e.status === 'pending' ? 'Onay Bekliyor' : e.status === 'cancelled' ? 'Iptal' : e.status;
          var statusColor = e.status === 'active' ? '#10b981' : e.status === 'pending' ? '#f59e0b' : '#ef4444';
          html += '<div class="glass-panel" style="margin-bottom:14px;padding:18px;display:flex;gap:14px;align-items:flex-start;">';
          html += '<img src="' + e.image + '" style="width:70px;height:70px;object-fit:cover;border-radius:8px;flex-shrink:0;" onerror="this.src=\'https://images.unsplash.com/photo-1540039155733-5bb30b4a574b?w=200\'">';
          html += '<div style="flex:1;">';
          html += '<div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:4px;">';
          html += '<strong style="color:var(--text);">' + e.title + '</strong>';
          html += '<span style="background:' + statusColor + '22;color:' + statusColor + ';border:1px solid ' + statusColor + '44;border-radius:20px;padding:2px 10px;font-size:0.75rem;">' + statusTxt + '</span>';
          html += '</div>';
          
          let formattedDate = e.date;
          try {
             let dObj = new Date(e.date);
             if(!isNaN(dObj)) {
                formattedDate = dObj.toLocaleDateString("tr-TR", {day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
             }
          } catch(e) {}

          html += '<p style="color:var(--text-muted);font-size:0.82rem;margin:2px 0;">' + formattedDate + ' | ' + e.location + '</p>';
          html += '<p style="color:var(--text-muted);font-size:0.82rem;margin:2px 0;">' + e.price.toLocaleString('tr-TR') + ' TL | Kapasite: ' + e.sold_count + '/' + e.capacity + '</p>';
          html += '</div>';
          if (e.status === 'active' || e.status === 'pending') {
            html += '<button class="btn btn-danger btn-sm" onclick="cancelEvent(\'' + e.id + '\')">Iptal Et</button>';
          }
          html += '</div>';
        }
        el.innerHTML = html;
      })
      .catch(function(err) {
        el.innerHTML = '<p class="loading-text" style="color:#f87171;">Yuklenemedi: ' + err.message + '</p>';
      });
    }

    function cancelEvent(id) {
      if (!confirm('Bu etkinligi iptal etmek istediginize emin misiniz?')) return;
      fetch('/api/events/' + id, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + getToken() }
      })
      .then(function(r){ return r.json(); })
      .then(function(d){ alert(d.message); loadMyEvents(); })
      .catch(function(){ alert('Hata olustu.'); });
    }

    // ── Create Event ───────────────────────────────────────────
    document.getElementById('evSubmitBtn').addEventListener('click', async function() {
      var btn = this;
      var fb  = document.getElementById('evFeedback');

      var isSeated = document.querySelector('input[name="ticket_type"]:checked').value === 'seated';
      
      var title    = document.getElementById('evTitle').value.trim();
      var category = document.getElementById('evCategory').value;
      var date     = document.getElementById('evDate').value.trim();
      var location = document.getElementById('evLocation').value.trim();
      var desc     = document.getElementById('evDesc').value.trim();
      var featured = document.getElementById('evFeatured').checked;
      
      var price = 0, capacity = 0;
      if (!isSeated) {
        price    = document.getElementById('evPrice').value.trim();
        capacity = document.getElementById('evCapacity').value.trim();
      }

      // Validate
      if (!title || !date || !location || (!isSeated && (!price || !capacity))) {
        fb.innerHTML = '<div style="padding:12px;border-radius:8px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.4);color:#fca5a5;">Lutfen tum zorunlu alanlari doldurun (Ad, Tarih, Konum, Fiyat, Kapasite)</div>';
        fb.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
      }

      var zones = [];
      if (isSeated) {
        document.querySelectorAll('.zone-item').forEach(function(z) {
          zones.push({
            name: z.querySelector('.z-name').value || 'Blok',
            rows: parseInt(z.querySelector('.z-rows').value) || 1,
            cols: parseInt(z.querySelector('.z-cols').value) || 1,
            price: parseInt(z.querySelector('.z-price').value) || 0
          });
        });
        if (zones.length === 0) {
          fb.innerHTML = '<div style="padding:12px;border-radius:8px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.4);color:#fca5a5;">Lütfen en az bir adet oturma bloğu ekleyin.</div>';
          return;
        }
      }

      var token = getToken();
      if (!token) {
        fb.innerHTML = '<div style="padding:12px;border-radius:8px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.4);color:#fca5a5;">Oturumunuz yok. Lutfen giris yapin.</div>';
        return;
      }

      btn.textContent = 'Gonderiliyor...';
      btn.disabled    = true;
      fb.innerHTML    = '';

      var fileInput = document.getElementById('evImageFile');
      var seatFileInput = document.getElementById('evSeatingImageFile');
      
      try {
        let finalImageUrl = '';
        let finalSeatingImageUrl = '';
        
        // Upload Main Image
        if (fileInput && fileInput.files.length > 0) {
            btn.textContent = 'Afiş Yükleniyor...';
            var formData = new FormData();
            formData.append('file', fileInput.files[0]);
            let r = await fetch('/api/upload', {
              method: 'POST',
              headers: { 'Authorization': 'Bearer ' + token },
              body: formData
            });
            let d = await r.json();
            if (d.url) { finalImageUrl = d.url; }
            else { throw new Error(d.message || "Afiş yüklenemedi"); }
        }
        
        // Upload Seating Image
        if (isSeated && seatFileInput && seatFileInput.files.length > 0) {
            btn.textContent = 'Oturma Planı Görseli Yükleniyor...';
            var formData2 = new FormData();
            formData2.append('file', seatFileInput.files[0]);
            let r2 = await fetch('/api/upload', {
              method: 'POST',
              headers: { 'Authorization': 'Bearer ' + token },
              body: formData2
            });
            let d2 = await r2.json();
            if (d2.url) { finalSeatingImageUrl = d2.url; }
            else { throw new Error(d2.message || "Seating image yüklenemedi"); }
        }
        
        btn.textContent = 'Etkinlik Kaydediliyor...';
        
        let res = await fetch('/api/events', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({
            title: title,
            category: category,
            date: date,
            price: isSeated ? 0 : parseInt(price),
            location: location,
            capacity: isSeated ? 0 : parseInt(capacity),
            image: finalImageUrl || '',
            description: desc,
            featured: featured,
            has_seating: isSeated ? 1 : 0,
            seating_image: finalSeatingImageUrl || '',
            zones: zones
          })
        });
        
        let data = await res.json();
        if (res.ok) {
           fb.innerHTML = '<div style="padding:12px;border-radius:8px;background:rgba(20,184,166,.12);border:1px solid rgba(20,184,166,.4);color:#5eead4;">' + (data.message || 'Etkinlik admin onayına gönderildi!') + '</div>';
           document.getElementById('evTitle').value = '';
           document.getElementById('evDate').value  = '';
           if(!isSeated) {
               document.getElementById('evPrice').value = '';
               document.getElementById('evCapacity').value  = '';
           }
           document.getElementById('evLocation').value  = '';
           if (fileInput) fileInput.value = '';
           if (seatFileInput) seatFileInput.value = '';
           document.getElementById('evDesc').value  = '';
           document.getElementById('evFeatured').checked = false;
        } else if (res.status === 401) {
           fb.innerHTML = '<div style="padding:12px;border-radius:8px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.4);color:#fca5a5;">Oturumunuz sona erdi. Giriş yapın.</div>';
           setTimeout(function(){ window.location.href = 'login.html'; }, 2000);
        } else {
           fb.innerHTML = '<div style="padding:12px;border-radius:8px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.4);color:#fca5a5;">Hata: ' + (data.message || res.status) + '</div>';
        }
        fb.scrollIntoView({ behavior: 'smooth', block: 'center' });
        
      } catch (err) {
        fb.innerHTML = '<div style="padding:12px;border-radius:8px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.4);color:#fca5a5;">İşlem hatası: ' + err.message + '</div>';
        fb.scrollIntoView({ behavior: 'smooth', block: 'center' });
      } finally {
        btn.textContent = 'Etkinlik Oluştur';
        btn.disabled    = false;
      }
    });

    // ── Revenue ────────────────────────────────────────────────
    function loadRevenue() {
      var el = document.getElementById('revenueSummary');
      var el2 = document.getElementById('revenueBreakdown');
      el.innerHTML = '<p class="loading-text">Yukleniyor...</p>';
      fetch('/api/organizer/revenue', {
        headers: { 'Authorization': 'Bearer ' + getToken() }
      })
      .then(function(r){ return r.json(); })
      .then(function(d) {
        el.innerHTML =
          '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;">' +
          '<div class="glass-panel" style="padding:18px;text-align:center;border-top:2px solid var(--gold);"><div style="font-size:1.6rem;font-weight:700;color:var(--gold);">' + d.total_revenue.toLocaleString('tr-TR') + ' TL</div><div style="color:var(--text-muted);font-size:0.82rem;margin-top:4px;">Toplam Ciro</div></div>' +
          '<div class="glass-panel" style="padding:18px;text-align:center;border-top:2px solid #ef4444;"><div style="font-size:1.6rem;font-weight:700;color:#ef4444;">' + d.commission.toLocaleString('tr-TR') + ' TL</div><div style="color:var(--text-muted);font-size:0.82rem;margin-top:4px;">Komisyon (%10)</div></div>' +
          '<div class="glass-panel" style="padding:18px;text-align:center;border-top:2px solid #14b8a6;"><div style="font-size:1.6rem;font-weight:700;color:#14b8a6;">' + d.net_revenue.toLocaleString('tr-TR') + ' TL</div><div style="color:var(--text-muted);font-size:0.82rem;margin-top:4px;">Net Gelir</div></div>' +
          '<div class="glass-panel" style="padding:18px;text-align:center;border-top:2px solid #3b82f6;"><div style="font-size:1.6rem;font-weight:700;color:#3b82f6;">' + d.total_tickets + '</div><div style="color:var(--text-muted);font-size:0.82rem;margin-top:4px;">Satilan Bilet</div></div>' +
          '</div>';
        var rows = '';
        var chartLabels = [];
        var chartNetData = [];
        for (var i = 0; i < d.breakdown.length; i++) {
          var b = d.breakdown[i];
          chartLabels.push(b.title);
          chartNetData.push(b.net_revenue);
          rows += '<tr style="border-bottom:1px solid var(--border);">' +
            '<td style="padding:9px 12px;color:var(--text);">' + b.title + '</td>' +
            '<td style="padding:9px 12px;text-align:right;color:var(--text-muted);">' + b.sold_count + '/' + b.capacity + '</td>' +
            '<td style="padding:9px 12px;text-align:right;color:var(--text);">' + b.gross_revenue.toLocaleString('tr-TR') + ' TL</td>' +
            '<td style="padding:9px 12px;text-align:right;color:#ef4444;">-' + b.commission.toLocaleString('tr-TR') + ' TL</td>' +
            '<td style="padding:9px 12px;text-align:right;color:#14b8a6;">' + b.net_revenue.toLocaleString('tr-TR') + ' TL</td>' +
            '</tr>';
        }
        el2.innerHTML = '<div class="glass-panel" style="overflow:auto;margin-top:16px;"><table style="width:100%;border-collapse:collapse;font-size:0.85rem;"><thead><tr style="border-bottom:1px solid var(--border);"><th style="text-align:left;padding:9px 12px;color:var(--text-muted);">Etkinlik</th><th style="text-align:right;padding:9px 12px;color:var(--text-muted);">Satis</th><th style="text-align:right;padding:9px 12px;color:var(--text-muted);">Brut</th><th style="text-align:right;padding:9px 12px;color:var(--text-muted);">Komisyon</th><th style="text-align:right;padding:9px 12px;color:var(--text-muted);">Net</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
        
        renderChart(chartLabels, chartNetData);
      })
      .catch(function(){ el.innerHTML = '<p class="loading-text" style="color:#f87171;">Yuklenemedi.</p>'; });
    }

    let revChartInstance = null;
    function renderChart(labels, data) {
      if(revChartInstance) revChartInstance.destroy();
      var ctx = document.getElementById('revenueChart').getContext('2d');
      Chart.defaults.color = "rgba(255,255,255,0.7)";
      revChartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{
            label: 'Net Gelir (TL)',
            data: data,
            backgroundColor: 'rgba(139, 92, 246, 0.6)',
            borderColor: 'rgba(139, 92, 246, 1)',
            borderWidth: 1,
            borderRadius: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: { beginAtZero: true, grid: { color: "rgba(255,255,255,0.1)" } },
            x: { grid: { display: false } }
          }
        }
      });
    }

    // ── QR Validate ────────────────────────────────────────────
    function checkQR() { validateQR('GET'); }
    function useQR()   { validateQR('POST'); }

    function validateQR(method) {
      var code = document.getElementById('qrInput').value.trim();
      var el   = document.getElementById('qrValidResult');
      if (!code) { el.innerHTML = '<p style="color:#fca5a5;">QR kod giriniz.</p>'; return; }
      fetch('/api/tickets/validate/' + encodeURIComponent(code), {
        method: method,
        headers: { 'Authorization': 'Bearer ' + getToken() }
      })
      .then(function(r){ return r.json(); })
      .then(function(d) {
        if (d.valid) {
          el.innerHTML = '<div style="background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.4);border-radius:10px;padding:16px;"><p style="color:#6ee7b7;font-weight:700;margin:0 0 8px;">GECERLI BILET' + (method === 'POST' ? ' - Kullanildi' : '') + '</p><p style="margin:0;font-size:0.875rem;">' + (d.ticket.title || 'Etkinlik') + ' | ' + (d.ticket.fullname || 'Misafir') + '</p></div>';
        } else {
          el.innerHTML = '<div style="background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);border-radius:10px;padding:16px;"><p style="color:#fca5a5;font-weight:700;margin:0 0 4px;">GECERSIZ</p><p style="color:var(--text-muted);margin:0;">' + d.message + '</p></div>';
        }
      })
      .catch(function(){ el.innerHTML = '<p style="color:#fca5a5;">Baglanti hatasi.</p>'; });
    }

    let qrScannerInstance = null;
    function initQRScanner() {
      if (qrScannerInstance) return; // already initialized
      qrScannerInstance = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
      qrScannerInstance.render(onScanSuccess);
    }
    
    function onScanSuccess(decodedText) {
      document.getElementById('qrInput').value = decodedText;
      useQR(); // Auto check and use
      qrScannerInstance.pause(true); // temporary pause
      setTimeout(() => {
         try { qrScannerInstance.resume(); } catch(e){}
      }, 3000); // Resume scanning after 3 sec
    }

    // ── Seating Plan logic ──────────────────────────────────────
    function toggleSeating() {
      var isSeated = document.querySelector('input[name="ticket_type"]:checked').value === 'seated';
      
      document.getElementById('typeStandardBox').style.borderColor = !isSeated ? 'var(--accent-purple)' : 'transparent';
      document.getElementById('typeSeatedBox').style.borderColor = isSeated ? 'var(--accent-purple)' : 'transparent';
      
      document.getElementById('seatingPlanBuilder').style.display = isSeated ? 'block' : 'none';
      
      // Hide standard fields if seated
      document.getElementById('standardPriceContainer').style.display = isSeated ? 'none' : 'block';
      document.getElementById('standardCapContainer').style.display = isSeated ? 'none' : 'block';
      
      var container = document.getElementById('zonesContainer');
      if (isSeated && container.children.length === 0) {
        addZone();
      }
    }

    function addZone() {
      var container = document.getElementById('zonesContainer');
      var html = '<div class="zone-item" style="display:grid;grid-template-columns:2fr 1fr 1fr 1.5fr;gap:10px;margin-bottom:10px;background:rgba(0,0,0,0.2);padding:10px;border-radius:8px;">' +
        '<div><label class="form-label" style="font-size:0.75rem;">Blok Adı</label><input type="text" class="form-control z-name" placeholder="Örn: VIP"></div>' +
        '<div><label class="form-label" style="font-size:0.75rem;">Satır</label><input type="number" class="form-control z-rows" value="5" min="1"></div>' +
        '<div><label class="form-label" style="font-size:0.75rem;">Sütun</label><input type="number" class="form-control z-cols" value="10" min="1"></div>' +
        '<div><label class="form-label" style="font-size:0.75rem;">Fiyat (₺)</label><input type="number" class="form-control z-price" value="500" min="0"></div>' +
        '</div>';
      container.insertAdjacentHTML('beforeend', html);
    }

    // ── Init ───────────────────────────────────────────────────
    loadMyEvents();
  </script>
</body>
</html>
