<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | EVENTİX</title>
  <link rel="stylesheet" href="./styles/main.css">
  <link rel="stylesheet" href="./styles/components.css">
  <link rel="stylesheet" href="./styles/dashboard.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    /* Hidden Ticket Template for PDF Generation */
    #hiddenTicketTemplate {
      position: absolute;
      left: -9999px;
      top: -9999px;
      width: 595px;
      background: white;
      color: black;
      font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    .pdf-ticket { width: 100%; background: white; }
    .pdf-header { background: linear-gradient(135deg, #5a19a0, #8b5cf6); padding: 30px 40px; color: white; }
    .pdf-logo { font-size: 28px; font-weight: 800; letter-spacing: 1px; }
    .pdf-body { padding: 40px; }
    .pdf-title { font-size: 24px; font-weight: 800; margin-bottom: 30px; border-bottom: 2px solid #f3f4f6; padding-bottom: 15px; color: #111; }
    .pdf-info-grid { display: grid; grid-template-columns: 1fr 200px; gap: 30px; }
    .pdf-field { margin-bottom: 20px; }
    .pdf-label { font-size: 11px; color: #6b7280; text-transform: uppercase; font-weight: 700; margin-bottom: 4px; }
    .pdf-value { font-size: 16px; font-weight: 700; color: #111; }
    .pdf-qr-box { border: 1px solid #e5e7eb; padding: 15px; border-radius: 12px; text-align: center; }
    .pdf-qr-img { width: 170px; height: 170px; }
    .pdf-footer { background: #f9fafb; padding: 20px; text-align: center; font-size: 10px; color: #9ca3af; border-top: 1px dashed #e5e7eb; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container nav-container">
      <a href="index.html" class="logo"><span>EVENT<span class="logo-highlight">İX</span></span></a>
      <div class="user-controls"></div>
    </div>
  </nav>

  <main class="container dashboard-page">
    <aside class="dash-sidebar glass-panel">
      <div class="dash-avatar" id="avatarInitials">?</div>
      <div class="dash-name" id="sidebarName">Yükleniyor...</div>
      <div class="dash-email" id="sidebarEmail">—</div>
      <nav class="dash-nav">
        <button class="dash-nav-btn active" onclick="showTab('tickets',this)">🎟 Biletlerim</button>
        <button class="dash-nav-btn" onclick="showTab('wishlist',this)">❤ Favorilerim</button>
        <button class="dash-nav-btn" onclick="showTab('notifications',this)">
          🔔 Bildirimler
          <span class="notif-badge" id="notifBadge" style="display:none;background:#ef4444;color:white;border-radius:50%;width:18px;height:18px;font-size:0.7rem;align-items:center;justify-content:center;margin-left:auto;"></span>
        </button>
        <button class="dash-nav-btn" onclick="showTab('profile',this)">👤 Profilim</button>
      </nav>
      <button onclick="logout()" class="btn" style="width:100%;margin-top:auto;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:var(--coral);padding:10px;">🚪 Çıkış Yap</button>
    </aside>

    <div class="dash-content">

      <!-- === TICKETS TAB === -->
      <section id="tab-tickets" class="dash-tab">
        <h2 class="dash-section-title">Biletlerim</h2>
        <div id="ticketsList"><p class="loading-text">Yükleniyor...</p></div>
      </section>

      <!-- === WISHLIST TAB === -->
      <section id="tab-wishlist" class="dash-tab" style="display:none;">
        <h2 class="dash-section-title">❤ Favorilerim</h2>
        <div id="wishlistGrid" class="events-grid"></div>
      </section>

      <!-- === NOTIFICATIONS TAB === -->
      <section id="tab-notifications" class="dash-tab" style="display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
          <h2 class="dash-section-title" style="margin:0;">Bildirimler</h2>
          <button class="btn btn-outline" style="font-size:0.8rem;padding:6px 14px;" onclick="markAllRead()">Tümünü Okundu Say</button>
        </div>
        <div id="notifList"><p class="loading-text">Yükleniyor...</p></div>
      </section>

      <!-- === PROFILE TAB === -->
      <section id="tab-profile" class="dash-tab" style="display:none;">
        <h2 class="dash-section-title">Profilimi Güncelle</h2>
        <div class="glass-panel" style="max-width:480px;padding:28px;">
          <div id="profileFeedback"></div>
          <div class="form-group">
            <label class="form-label">Ad Soyad</label>
            <input type="text" id="profileName" class="form-control" placeholder="Ad Soyad">
          </div>
          <div class="form-group">
            <label class="form-label">Telefon Numarası</label>
            <input type="tel" id="profilePhone" class="form-control" placeholder="05XX XXX XX XX">
          </div>
          <div class="form-group">
            <label class="form-label">Doğum Tarihi</label>
            <input type="date" id="profileBirthdate" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">E-posta (değiştirilemez)</label>
            <input type="email" id="profileEmail" class="form-control" disabled style="opacity:0.6;">
          </div>
          <div class="form-group">
            <label class="form-label">Rol</label>
            <input type="text" id="profileRole" class="form-control" disabled style="opacity:0.6;">
          </div>
          <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;" onclick="saveProfile()">Kaydet</button>
        </div>

        <h2 class="dash-section-title" style="margin-top:32px;">Şifremi Değiştir</h2>
        <div class="glass-panel" style="max-width:480px;padding:28px;">
          <div id="passwordFeedback"></div>
          <div class="form-group">
            <label class="form-label">Mevcut Şifre</label>
            <input type="password" id="currentPassword" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Yeni Şifre</label>
            <input type="password" id="newPassword" class="form-control">
          </div>
          <div class="form-group">
            <label class="form-label">Yeni Şifre (Tekrar)</label>
            <input type="password" id="confirmPassword" class="form-control">
          </div>
          <button class="btn btn-outline" style="width:100%;justify-content:center;padding:12px;border-color:var(--gold);color:var(--gold);margin-top:8px;" onclick="changePassword()">Şifreyi Güncelle</button>
        </div>
      </section>

    </div>
  </main>

  <!-- Hidden Ticket Template for PDF -->
  <div id="hiddenTicketTemplate">
    <div class="pdf-ticket">
      <div class="pdf-header">
        <div class="pdf-logo">EVENT <span style="color:#fcd34d;">İX</span></div>
        <div style="font-size:10px; margin-top:5px; opacity:0.9; font-weight:600;">RESMİ E-BİLET & KONFİRMASYON</div>
      </div>
      <div class="pdf-body">
        <div class="pdf-title" id="pdfEventTitle">Etkinlik Adı</div>
        <div class="pdf-info-grid">
          <div>
            <div class="pdf-field">
              <div class="pdf-label">Tarih & Saat</div>
              <div class="pdf-value" id="pdfEventDate">...</div>
            </div>
            <div class="pdf-field">
              <div class="pdf-label">Konum</div>
              <div class="pdf-value" id="pdfEventLocation">...</div>
            </div>
            <div class="pdf-field">
              <div class="pdf-label">Katılımcı</div>
              <div class="pdf-value" id="pdfAttendeeName">...</div>
            </div>
            <div class="pdf-field" id="pdfSeatField" style="display:none;">
              <div class="pdf-label">Koltuk</div>
              <div class="pdf-value" id="pdfSeatInfo">-</div>
            </div>
            <div class="pdf-field">
              <div class="pdf-label">Fiyat</div>
              <div class="pdf-value" id="pdfTicketPrice">0,00 ₺</div>
            </div>
          </div>
          <div class="pdf-qr-box">
            <img src="" id="pdfQrImage" class="pdf-qr-img" alt="QR">
            <div class="pdf-label" style="margin-top:10px;">Bilet Kodu</div>
            <div style="font-family:monospace; font-weight:700; font-size:14px;" id="pdfTicketKey">...</div>
          </div>
        </div>
      </div>
      <div class="pdf-footer">Eventix Biletleme Platformu © 2026</div>
    </div>
  </div>

  <script src="./scripts/auth.js"></script>
  <script>
    // Auth guard
    const user = getUser();
    if (!user) { window.location.href = 'login.html'; }

    if (user) {
      document.getElementById('sidebarName').textContent = user.fullname;
      document.getElementById('sidebarEmail').textContent = user.email;
      document.getElementById('avatarInitials').textContent = user.fullname.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
      document.getElementById('profileName').value = user.fullname;
      document.getElementById('profilePhone').value = user.phone || '';
      document.getElementById('profileBirthdate').value = user.birthdate || '';
      document.getElementById('profileEmail').value = user.email;
      document.getElementById('profileRole').value = user.role === 'customer' ? '🎟 Müşteri' : user.role === 'organizer' ? '🎪 Organizatör' : '⚙ Admin';
    }

    // Date formatting helper
    function fDate(ds) {
      try {
        const d = new Date(ds);
        if(isNaN(d)) return ds;
        return d.toLocaleDateString("tr-TR", {day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
      } catch { return ds; }
    }

    // Tab switching
    function showTab(name, btn) {
      document.querySelectorAll('.dash-tab').forEach(t => t.style.display = 'none');
      document.getElementById('tab-' + name).style.display = 'block';
      document.querySelectorAll('.dash-nav-btn').forEach(b => b.classList.remove('active'));
      
      let targetBtn = btn;
      if (!targetBtn) {
        targetBtn = Array.from(document.querySelectorAll('.dash-nav-btn')).find(b => b.getAttribute('onclick')?.includes(`'${name}'`));
      }
      if (targetBtn) targetBtn.classList.add('active');
      
      if (name === 'tickets') loadTickets();
      if (name === 'wishlist') loadWishlist();
      if (name === 'notifications') loadNotifications();
    }

    // ── TICKETS ──────────────────────────────────────────
    // ── TICKETS ──────────────────────────────────────────
    window._myTickets = [];

    async function loadTickets() {
      const el = document.getElementById('ticketsList');
      el.innerHTML = '<p class="loading-text">Yükleniyor...</p>';
      try {
        const res = await fetch('/api/tickets/my-tickets', { headers: authHeaders() });
        const tickets = await res.json();
        window._myTickets = tickets;

        if (!tickets.length) { el.innerHTML = '<p class="loading-text">Henüz bilet satın almadınız.</p>'; return; }
        el.innerHTML = tickets.map((t, idx) => {
          const statusColor = { valid: '#10b981', used: '#6b7280', refund_pending: '#f59e0b' }[t.status] || '#6b7280';
          const statusLabel = { valid: '✓ Geçerli', used: '✗ Kullanıldı', refund_pending: '⏳ İade Bekliyor' }[t.status] || t.status;
          
          const seatInfo = t.zone ? `(🪑 ${t.zone} ${t.row_label}-${t.col_label})` : '';

          return `
          <div class="ticket-card glass-panel" style="display:flex;gap:20px;margin-bottom:16px;padding:20px;">
            <img src="${t.image || ''}" alt="${t.title}" style="width:90px;height:90px;object-fit:cover;border-radius:10px;flex-shrink:0;" onerror="this.style.display='none'">
            <div style="flex:1;min-width:0;">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;">
                <h3 style="color:var(--text);font-size:1rem;margin:0 0 4px;">${t.title}</h3>
                <span style="background:${statusColor}22;color:${statusColor};border:1px solid ${statusColor}44;border-radius:20px;padding:2px 10px;font-size:0.75rem;white-space:nowrap;flex-shrink:0;">${statusLabel}</span>
              </div>
              <p style="color:var(--gold);font-size:0.9rem;font-weight:bold;margin:0 0 8px;">
                👤 ${t.owner_name && t.owner_surname ? (t.owner_name + ' ' + t.owner_surname) : 'Standart'}
                ${seatInfo}
              </p>
              <p style="color:var(--text-muted);font-size:0.82rem;margin:0 0 2px;">📅 ${fDate(t.date)}</p>
              <p style="color:var(--text-muted);font-size:0.82rem;margin:0 0 8px;">📍 ${t.location}</p>
              <p style="color:var(--text-muted);font-size:0.78rem;margin:0;">Bilet Kodu: <strong style="color:var(--text);font-family:monospace;">${t.ticket_key}</strong> &nbsp;|&nbsp; Fiyat: ${(t.total_price || 0).toLocaleString('tr-TR')} ₺</p>
            </div>
            ${t.qr_code && t.status === 'valid' ? `
            <div style="flex-shrink:0;text-align:center;display:flex;flex-direction:column;gap:8px;justify-content:center;">
              <button class="btn btn-outline" style="font-size:0.75rem;padding:6px 14px;" onclick="showQR('${t.qr_code}','${t.ticket_key.replace(/'/g,"\\'")}')">QR Göster</button>
              <button class="btn btn-primary" style="font-size:0.75rem;padding:6px 14px;background:var(--accent-purple);border-color:var(--accent-purple);" onclick="downloadPDF(${idx})">PDF İndir</button>
            </div>` : ''}
          </div>`;
        }).join('');
      } catch { el.innerHTML = '<p class="loading-text" style="color:#f87171;">Biletler yüklenemedi.</p>'; }
    }

    // ── PDF GENERATION FOR DASHBOARD ───────────────────
    // ── PDF GENERATION FOR DASHBOARD ───────────────────
    async function downloadPDF(idx) {
      const t = window._myTickets[idx];
      if (!t) return;
      
      const fDateLong = ds => {
        try {
          const d = new Date(ds);
          if (isNaN(d)) return ds;
          return d.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        } catch { return ds; }
      };

      const oTitle = t.title || 'Etkinlik';
      const oDate = fDateLong(t.date);
      const oLoc = t.location || '-';
      const oName = (t.owner_name && t.owner_surname) ? `${t.owner_name} ${t.owner_surname}` : 'Katılımcı';
      const oPrice = (t.total_price || 0).toLocaleString('tr-TR');

      let oSeatDisp = 'none';
      let oSeatVal = '-';
      if (t.zone) { 
        oSeatDisp = 'block'; 
        oSeatVal = `${t.zone} ${t.row_label}-${t.col_label}`; 
      }

      let qrSrc = t.qr_code || '';
      if (qrSrc && !qrSrc.startsWith('data:')) {
         qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(qrSrc)}`;
      }

      const htmlStr = `
        <div style="width: 595px; background: white; color: black; font-family: 'Inter', 'Segoe UI', Arial, sans-serif; padding: 0; margin: 0 auto;">
          <div style="background: linear-gradient(135deg, #5a19a0, #8b5cf6); padding: 30px 40px; color: white;">
            <div style="font-size: 28px; font-weight: 800; letter-spacing: 1px;">EVENT <span style="color:#fcd34d;">İX</span></div>
            <div style="font-size:10px; margin-top:5px; opacity:0.9; font-weight:600;">RESMİ E-BİLET & KONFİRMASYON</div>
          </div>
          <div style="padding: 40px;">
            <div style="font-size: 24px; font-weight: 800; margin-bottom: 30px; border-bottom: 2px solid #f3f4f6; padding-bottom: 15px; color: #111;">
              ${oTitle}
            </div>
            <div style="display: flex; justify-content: space-between; gap: 30px;">
              <div style="flex: 1;">
                <div style="margin-bottom: 20px;">
                  <div style="font-size: 11px; color: #6b7280; text-transform: uppercase; font-weight: 700; margin-bottom: 4px;">Tarih & Saat</div>
                  <div style="font-size: 16px; font-weight: 700; color: #111;">${oDate}</div>
                </div>
                <div style="margin-bottom: 20px;">
                  <div style="font-size: 11px; color: #6b7280; text-transform: uppercase; font-weight: 700; margin-bottom: 4px;">Konum</div>
                  <div style="font-size: 16px; font-weight: 700; color: #111;">${oLoc}</div>
                </div>
                <div style="margin-bottom: 20px;">
                  <div style="font-size: 11px; color: #6b7280; text-transform: uppercase; font-weight: 700; margin-bottom: 4px;">Katılımcı</div>
                  <div style="font-size: 16px; font-weight: 700; color: #111;">${oName}</div>
                </div>
                <div style="margin-bottom: 20px; display: ${oSeatDisp};">
                  <div style="font-size: 11px; color: #6b7280; text-transform: uppercase; font-weight: 700; margin-bottom: 4px;">Koltuk</div>
                  <div style="font-size: 16px; font-weight: 700; color: #111;">${oSeatVal}</div>
                </div>
                <div style="margin-bottom: 20px;">
                  <div style="font-size: 11px; color: #6b7280; text-transform: uppercase; font-weight: 700; margin-bottom: 4px;">Fiyat</div>
                  <div style="font-size: 16px; font-weight: 700; color: #111;">${oPrice} ₺</div>
                </div>
              </div>
              <div style="border: 1px solid #e5e7eb; padding: 15px; border-radius: 12px; text-align: center; width: 170px; height: 230px;">
                <img src="${qrSrc}" alt="QR Kod" style="width: 170px; height: 170px; display: block; margin: 0 auto; object-fit: contain;">
                <div style="margin-top:10px; font-size: 11px; color: #6b7280; text-transform: uppercase; font-weight: 700;">Bilet Kodu</div>
                <div style="font-family:monospace; font-weight:700; font-size:14px; letter-spacing:1px; color: #111; margin-top: 5px;">${t.ticket_key}</div>
              </div>
            </div>
            
            <div style="margin-top:40px; padding:20px; background:#f5f3ff; border-radius:12px; border:1px solid #ddd; text-align:center;">
               <span style="display:block; font-size:10px; color:#7c3aed; font-weight:700; margin-bottom:5px;">ÖNEMLİ NOT</span>
               <span style="font-size:12px; color:#4b5563;">Bu bilet kişiye özeldir. Lütfen girişteki görevliye QR kodu okutunuz.</span>
            </div>
          </div>
          <div style="background: #f9fafb; padding: 20px; text-align: center; font-size: 10px; color: #9ca3af; border-top: 1px dashed #e5e7eb;">
            Bu belge EVENTİX Biletleme Platformu tarafından otomatik olarak oluşturulmuştur.<br>Sahteciliğe karşı korunmaktadır. © 2026
          </div>
        </div>
      `;

      const opt = {
        margin: 0,
        filename: `Bilet_${t.title.replace(/ /g,'_')}_${t.ticket_key}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, logging: false },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };

      try {
        await html2pdf().set(opt).from(htmlStr).save();
      } catch (e) {
        console.error(e);
        alert('PDF indirme sırasında bir hata oluştu.');
      }
    }

    // Show QR popup
    function showQR(qrData, key) {
      const win = window.open('', '_blank', 'width=340,height=420');
      win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>QR Bilet</title><style>body{margin:0;background:#0f0a1e;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:white;}</style></head><body>
        <div style="background:white;padding:16px;border-radius:12px;margin-bottom:16px;">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(qrData)}" width="200" height="200" style="display:block;">
        </div>
        <p style="font-size:0.85rem;color:#a1a1aa;margin:0 0 4px;">Bilet Kodu</p>
        <p style="font-family:monospace;font-size:1.1rem;margin:0;">${key}</p>
      </body></html>`);
    }

    // ── WISHLIST ──────────────────────────────────────────
    async function loadWishlist() {
      const el = document.getElementById('wishlistGrid');
      el.innerHTML = '<p class="loading-text" style="grid-column:1/-1;">Yükleniyor...</p>';
      try {
        const res = await fetch('/api/wishlist', { headers: authHeaders() });
        const items = await res.json();
        if (!items.length) { el.innerHTML = '<p class="loading-text" style="grid-column:1/-1;">Favori listeniz boş.</p>'; return; }
        el.innerHTML = items.map(e => `
          <div class="event-card glass-panel" style="cursor:pointer;" onclick="window.location.href='event-detail.html?id=${e.id}'">
            <div class="event-img-wrapper">
              <img src="${e.image}" alt="${e.title}" class="event-img" loading="lazy">
            </div>
            <div class="event-content">
              <div class="event-date">${fDate(e.date)}</div>
              <h3 class="event-title">${e.title}</h3>
              <div class="event-location" style="display:flex;align-items:center;gap:4px;">📍 ${e.location}</div>
              <div class="event-footer">
                <div class="event-price">${(e.price || 0).toLocaleString('tr-TR')} ₺</div>
                <button class="btn btn-outline" style="font-size:0.8rem;padding:6px 12px;" onclick="event.stopPropagation();removeWish('${e.id}',this.closest('.event-card'))">❤ Çıkar</button>
              </div>
            </div>
          </div>`).join('');
      } catch (err) { 
        console.error(err);
        el.innerHTML = `<p class="loading-text" style="grid-column:1/-1;color:#f87171;">Favoriler yüklenemedi: ${err.message || 'Bilinmeyen hata'}</p>`; 
      }
    }

    async function removeWish(eventId, card) {
      try {
        const res = await fetch(`/api/wishlist/${eventId}`, { method: 'DELETE', headers: authHeaders() });
        if (res.ok) { card.remove(); }
      } catch {}
    }

    // ── NOTIFICATIONS ──────────────────────────────────────
    async function loadNotifications() {
      const el = document.getElementById('notifList');
      el.innerHTML = '<p class="loading-text">Yükleniyor...</p>';
      try {
        const res = await fetch('/api/notifications', { headers: authHeaders() });
        const notifs = await res.json();
        const unread = notifs.filter(n => !n.is_read).length;
        const badge = document.getElementById('notifBadge');
        badge.style.display = unread > 0 ? 'inline-flex' : 'none';
        badge.textContent = unread;
        if (!notifs.length) { el.innerHTML = '<p class="loading-text">Bildirim yok.</p>'; return; }
        el.innerHTML = notifs.map(n => `
          <div class="glass-panel" style="padding:14px 18px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;border-left:3px solid ${n.is_read ? 'transparent' : 'var(--gold)'};">
            <span style="font-size:1.2rem;flex-shrink:0;">${n.is_read ? '🔔' : '🔔'}</span>
            <div style="flex:1;">
              <p style="color:var(--text); opacity:${n.is_read ? '0.6' : '1'}; margin:0 0 4px; font-size:0.9rem;">${n.message}</p>
              <p style="color:var(--text-muted);font-size:0.75rem;margin:0;">${new Date(n.created_at).toLocaleString('tr-TR')}</p>
            </div>
            ${!n.is_read ? `<button class="btn btn-outline" style="font-size:0.75rem;padding:4px 10px;flex-shrink:0;" onclick="readOne(${n.id},this)">Okundu</button>` : ''}
          </div>`).join('');
      } catch { el.innerHTML = '<p class="loading-text" style="color:#f87171;">Bildirimler yüklenemedi.</p>'; }
    }

    async function readOne(id, btn) {
      try {
        await fetch(`/api/notifications/${id}/read`, { method: 'PATCH', headers: authHeaders() });
        btn.closest('.glass-panel').style.borderLeftColor = 'transparent';
        const msgPara = btn.closest('.glass-panel').querySelector('p');
        msgPara.style.opacity = '0.6';
        btn.remove();
        loadNotifications();
      } catch {}
    }

    async function markAllRead() {
      try {
        await fetch('/api/notifications/read-all', { method: 'PATCH', headers: authHeaders() });
        loadNotifications();
      } catch {}
    }

    // ── PROFILE ──────────────────────────────────────────
    async function saveProfile() {
      const fullname = document.getElementById('profileName').value.trim();
      const phone = document.getElementById('profilePhone').value.trim();
      const birthdate = document.getElementById('profileBirthdate').value;
      if (!fullname) return;
      try {
        const res = await fetch('/api/users/me', {
          method: 'PATCH',
          headers: authHeaders(),
          body: JSON.stringify({ fullname, phone, birthdate })
        });
        const fb = document.getElementById('profileFeedback');
        if (res.ok) {
          fb.innerHTML = '<p style="color:#6ee7b7;background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);padding:10px 14px;border-radius:8px;margin-bottom:12px;">✓ Profil güncellendi!</p>';
          const u = getUser();
          u.fullname = fullname;
          u.phone = phone;
          u.birthdate = birthdate;
          localStorage.setItem('user', JSON.stringify(u));
          document.getElementById('sidebarName').textContent = fullname;
          document.getElementById('avatarInitials').textContent = fullname.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
          if (window.renderNav) renderNav();
        } else {
          fb.innerHTML = '<p style="color:#fca5a5;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);padding:10px 14px;border-radius:8px;margin-bottom:12px;">⚠ Hata oluştu.</p>';
        }
      } catch {}
    }

    async function changePassword() {
      const current_password = document.getElementById('currentPassword').value;
      const new_password = document.getElementById('newPassword').value;
      const confirm_password = document.getElementById('confirmPassword').value;
      const fb = document.getElementById('passwordFeedback');

      if (!current_password || !new_password || !confirm_password) {
        fb.innerHTML = '<p style="color:#fca5a5;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);padding:10px 14px;border-radius:8px;margin-bottom:12px;">⚠ Tüm alanları doldurun.</p>';
        return;
      }
      if (new_password.length < 6) {
        fb.innerHTML = '<p style="color:#fca5a5;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);padding:10px 14px;border-radius:8px;margin-bottom:12px;">⚠ Şifre en az 6 karakter olmalıdır.</p>';
        return;
      }
      if (new_password !== confirm_password) {
        fb.innerHTML = '<p style="color:#fca5a5;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);padding:10px 14px;border-radius:8px;margin-bottom:12px;">⚠ Yeni şifreler eşleşmiyor.</p>';
        return;
      }

      try {
        const res = await fetch('/api/users/change-password', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ current_password, new_password })
        });
        const d = await res.json();
        if (res.ok) {
          fb.innerHTML = '<p style="color:#6ee7b7;background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);padding:10px 14px;border-radius:8px;margin-bottom:12px;">✓ Şifre başarıyla güncellendi!</p>';
          document.getElementById('currentPassword').value = '';
          document.getElementById('newPassword').value = '';
          document.getElementById('confirmPassword').value = '';
        } else {
          fb.innerHTML = `<p style="color:#fca5a5;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);padding:10px 14px;border-radius:8px;margin-bottom:12px;">⚠ ${d.message || 'Hata oluştu'}</p>`;
        }
      } catch {
        fb.innerHTML = '<p style="color:#fca5a5;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);padding:10px 14px;border-radius:8px;margin-bottom:12px;">⚠ Sunucu hatası.</p>';
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      const p = new URLSearchParams(window.location.search);
      const t = p.get('tab') || 'tickets';
      showTab(t);
    });
  </script>
</body>
</html>
